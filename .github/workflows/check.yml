name: 核心服务可用性检查

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ping_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Availability Check
        env:
          HOSTS: ${{ secrets.HOST }}
          PING_TOKEN: ${{ secrets.PING_TOKEN }}
          TRY_TIMES: ${{ secrets.TRY_TIMES }}
          EMAIL_TO: ${{ secrets.EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python - <<EOF
          import os
          import requests
          import time
          import smtplib
          from email.mime.text import MIMEText
          from email.header import Header
          from datetime import datetime

          def send_email(subject, content):
              msg = MIMEText(content, 'plain', 'utf-8')
              msg['From'] = f"Monitor System <{os.environ['SMTP_USER']}>"
              msg['To'] = os.environ['EMAIL_TO']
              msg['Subject'] = Header(subject, 'utf-8')
              
              try:
                  with smtplib.SMTP_SSL(os.environ['SMTP_SERVER'], 465) as server:
                      server.login(os.environ['SMTP_USER'], os.environ['SMTP_PASS'])
                      server.sendmail(os.environ['SMTP_USER'], [os.environ['EMAIL_TO']], msg.as_string())
                  print("✅ 告警邮件已发送")
              except Exception as e:
                  print(f"❌ 邮件发送失败: {e}")

          def check_sites():
              # 解析 HOST: 支持 "[url1, url2]" 或 "url1, url2" 格式
              raw_hosts = os.environ['HOSTS'].strip("[] ")
              hosts = [h.strip() for h in raw_hosts.split(',') if h.strip()]
              
              token = os.environ['PING_TOKEN']
              try_limit = int(os.environ.get('TRY_TIMES', 5))
              
              failed_reports = []

              for host in hosts:
                  # 规范化 URL 拼接
                  base = host.rstrip('/')
                  target_url = f"{base}/ping"
                  
                  is_ok = False
                  print(f"🔍 正在检查: {target_url}")

                  for i in range(1, try_limit + 1):
                      try:
                          # 携带 Token 访问
                          response = requests.get(
                              target_url, 
                              headers={"Authorization": f"Bearer {token}"}, 
                              timeout=15
                          )
                          if response.status_code == 200:
                              print(f"  - 第 {i} 次尝试: 成功 (200 OK)")
                              is_ok = True
                              break
                          else:
                              print(f"  - 第 {i} 次尝试: 失败 (状态码: {response.status_code})")
                      except Exception as e:
                          print(f"  - 第 {i} 次尝试: 异常 ({type(e).__name__})")
                      
                      if i < try_limit:
                          time.sleep(10) # 失败后等待10秒再重试

                  if not is_ok:
                      failed_reports.append(target_url)

              if failed_reports:
                  now_time = datetime.now().strftime('%Y-%m-%d %H:%M:%S')
                  subject = "可用性检查不通过"
                  content = (
                      f"警报：站点监控发现异常！\n\n"
                      f"失败地址：\n" + "\n".join([f" - {url}" for url in failed_reports]) +
                      f"\n\n检查时间：{now_time}\n"
                      f"重试次数：{try_limit} 次后仍未恢复。"
                  )
                  send_email(subject, content)
              else:
                  print("✨ 所有站点检查通过，状态良好。")

          if __name__ == "__main__":
              check_sites()
          EOF
